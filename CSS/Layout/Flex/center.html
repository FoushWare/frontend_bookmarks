<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flexbox: center anything</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 40px; background: #fafafa; }
  h1 { font-size: 16px; color: #333; }

  .container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 220px;
    background: #eeedfe;
    border: 1px solid #cecbf6;
    border-radius: 8px;
  }
  .box {
    width: 120px;
    height: 80px;
    background: #7f77dd;
    color: white;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }
</style>
</head>
<body>
  <h1>display: flex; justify-content: center; align-items: center;</h1>
  <div class="container">
    <div class="box">Centered box</div>
  </div>
</body>
</html>
