<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid: Center Content</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 0; background: #fafafa; }
        
        .container {
            display: grid;
            place-items: center;
            min-height: 100vh;
        }
        
        .box {
            width: 200px;
            height: 120px;
            background: #eeedfe;
            border: 1px solid #cecbf6;
            border-radius: 8px;
            padding: 20px;
            font-size: 14px;
            color: #26215c;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">Centered with Grid</div>
    </div>
</body>
</html>
