<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .cell { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
      .item { fill: #eeedfe; stroke: #cecbf6; stroke-width: 2; rx: 4; }
      .item-span { fill: #faece7; stroke: #f0997b; stroke-width: 2; rx: 4; }
      .line { stroke: #667eea; stroke-width: 2; }
      .line-label { font-family: system-ui, sans-serif; font-size: 10px; fill: #667eea; font-weight: bold; }
      .label { font-family: system-ui, sans-serif; font-size: 12px; fill: #26215c; text-anchor: middle; }
      .section-label { font-family: system-ui, sans-serif; font-size: 14px; fill: #333; font-weight: bold; }
      .code { font-family: 'Courier New', monospace; font-size: 11px; fill: #333; }
    </style>
  </defs>
  
  <!-- Grid cells -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="80" height="60" class="cell"/>
    <rect x="80" y="0" width="80" height="60" class="cell"/>
    <rect x="160" y="0" width="80" height="60" class="cell"/>
    
    <rect x="0" y="60" width="80" height="60" class="cell"/>
    <rect x="80" y="60" width="80" height="60" class="cell"/>
    <rect x="160" y="60" width="80" height="60" class="cell"/>
  </g>
  
  <!-- Grid lines -->
  <line x1="50" y1="50" x2="50" y2="170" class="line"/>
  <text x="50" y="40" class="line-label" text-anchor="middle">1</text>
  
  <line x1="130" y1="50" x2="130" y2="170" class="line"/>
  <text x="130" y="40" class="line-label" text-anchor="middle">2</text>
  
  <line x1="210" y1="50" x2="210" y2="170" class="line"/>
  <text x="210" y="40" class="line-label" text-anchor="middle">3</text>
  
  <line x1="290" y1="50" x2="290" y2="170" class="line"/>
  <text x="290" y="40" class="line-label" text-anchor="middle">4</text>
  
  <line x1="50" y1="50" x2="290" y2="50" class="line"/>
  <text x="40" y="55" class="line-label" text-anchor="end">1</text>
  
  <line x1="50" y1="110" x2="290" y2="110" class="line"/>
  <text x="40" y="115" class="line-label" text-anchor="end">2</text>
  
  <line x1="50" y1="170" x2="290" y2="170" class="line"/>
  <text x="40" y="175" class="line-label" text-anchor="end">3</text>
  
  <!-- Items -->
  <rect x="130" y="50" width="80" height="60" class="item-span"/>
  <text x="170" y="85" class="label">grid-column: 2 / 3</text>
  
  <rect x="50" y="110" width="80" height="60" class="item"/>
  <text x="90" y="145" class="label">Item</text>
  
  <rect x="210" y="110" width="80" height="60" class="item"/>
  <text x="250" y="145" class="label">Item</text>
  
  <!-- Code example -->
  <g transform="translate(350, 50)">
    <rect x="0" y="0" width="200" height="120" fill="#2c3e50" rx="4"/>
    <text x="10" y="20" class="code" fill="#ecf0f1">.featured {</text>
    <text x="10" y="35" class="code" fill="#ecf0f1">  grid-column: 2 / 3;</text>
    <text x="10" y="50" class="code" fill="#ecf0f1">}</text>
    <text x="10" y="70" class="code" fill="#ecf0f1">/* or using span */</text>
    <text x="10" y="85" class="code" fill="#ecf0f1">.featured {</text>
    <text x="10" y="100" class="code" fill="#ecf0f1">  grid-column: span 1;</text>
    <text x="10" y="115" class="code" fill="#ecf0f1">}</text>
  </g>
</svg>
