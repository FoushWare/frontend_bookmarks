<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Reference Guide</title>
    <link rel="stylesheet" href="../../../theme.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: background 0.3s;
        }
        [data-theme="dark"] .navbar {
            background: rgba(26, 26, 46, 0.98);
        }
        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .navbar .logo {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--accent);
            text-decoration: none;
        }
        .navbar .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .theme-toggle {
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            border-color: var(--accent);
        }
        .navbar .nav-links a {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .navbar .nav-links a:hover {
            background: var(--bg-tertiary);
            color: var(--accent);
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 20px;
            border-radius: 20px;
            margin-bottom: 40px;
            text-align: center;
        }
        .header h1 {
            font-size: 3em;
            margin-bottom: 15px;
        }
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .content-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .content-nav a {
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            transition: all 0.3s;
        }
        .content-nav a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .content-nav a.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .markdown-content {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 40px;
            box-shadow: var(--shadow);
            line-height: 1.8;
        }
        .markdown-content h1 {
            font-size: 2.5em;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color);
        }
        .markdown-content h2 {
            font-size: 2em;
            color: var(--text-primary);
            margin-top: 40px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .markdown-content h3 {
            font-size: 1.5em;
            color: var(--text-primary);
            margin-top: 30px;
            margin-bottom: 15px;
        }
        .markdown-content h4 {
            font-size: 1.25em;
            color: var(--text-primary);
            margin-top: 25px;
            margin-bottom: 10px;
        }
        .markdown-content p {
            margin-bottom: 15px;
            color: var(--text-secondary);
        }
        .markdown-content code {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        .markdown-content pre {
            background: var(--code-bg);
            color: var(--code-text);
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
        }
        .markdown-content pre code {
            background: none;
            padding: 0;
            color: var(--code-text);
        }
        .markdown-content ul, .markdown-content ol {
            margin: 15px 0;
            padding-left: 30px;
            color: var(--text-secondary);
        }
        .markdown-content li {
            margin: 8px 0;
        }
        .markdown-content blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 20px;
            margin: 20px 0;
            color: var(--text-tertiary);
            font-style: italic;
            background: var(--bg-tertiary);
            padding: 15px 20px;
            border-radius: 0 8px 8px 0;
        }
        .markdown-content a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .markdown-content a:hover {
            text-decoration: underline;
        }
        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .markdown-content th, .markdown-content td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
        }
        .markdown-content th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--text-primary);
        }
        .markdown-content img {
            max-width: 100%;
            border-radius: 10px;
            margin: 20px 0;
        }
        .markdown-content hr {
            border: none;
            border-top: 2px solid var(--border-color);
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="../../../index.html" class="logo">🚀 Learning Hub</a>
            <div class="nav-links">
                <a href="../../../css.html">← Back to CSS</a>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <a href="../../../css.html" class="back-link">← Back to CSS</a>
        
        <div class="header">
            <h1>🔲 Border Reference Guide</h1>
            <p>Comprehensive guide to CSS border properties</p>
        </div>
        
        <div class="content-nav">
            <a href="border-reference.html" class="active">📖 Reference Guide</a>
            <a href="border-examples.html">🎯 Examples</a>
            <a href="border-interview.html">❓ Interview Questions</a>
            <a href="border-projects.html">💻 Projects</a>
        </div>
        
        <div class="markdown-content" id="markdownContent">
            Loading...
        </div>
    </div>

    <script src="../../../theme.js"></script>
    <script>
        // Load markdown content
        fetch('border-reference.md')
            .then(response => response.text())
            .then(markdown => {
                const html = marked.parse(markdown);
                document.getElementById('markdownContent').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('markdownContent').innerHTML = '<p>Error loading content. Please try again.</p>';
            });
    </script>
</body>
</html>
