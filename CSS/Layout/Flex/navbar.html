<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flexbox: navbar layout</title>
<link rel="stylesheet" href="../../../../theme.css">
<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 40px;
    background: var(--bg-primary);
    color: var(--text-primary);
    transition: background 0.3s, color 0.3s;
  }
  h1 {
    font-size: 16px;
    color: var(--text-primary);
    margin-bottom: 20px;
  }
  .code-block {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
    font-size: 14px;
    border: 1px solid var(--border-color);
  }

  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 12px 20px;
  }
  .logo { font-weight: 600; font-size: 15px; color: var(--text-primary); }
  .links { display: flex; gap: 20px; list-style: none; margin: 0; padding: 0; }
  .links a { text-decoration: none; color: var(--accent); font-size: 13px; }
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--bg-tertiary);
    border: 2px solid var(--border-color);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    z-index: 1000;
  }
</style>
</head>
<body>
  <button class="theme-toggle" aria-label="Toggle theme">🌙</button>
  <h1>Flexbox: Navbar Layout</h1>
  <div class="code-block">
    display: flex;<br>
    justify-content: space-between;<br>
    align-items: center;
  </div>
  <nav class="navbar">
    <div class="logo">Brand</div>
    <ul class="links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
  <script src="../../../../theme.js"></script>
</body>
</html>
