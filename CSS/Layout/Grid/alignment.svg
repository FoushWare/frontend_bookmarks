<svg width="600" height="350" viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .cell { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
      .item { fill: #eeedfe; stroke: #cecbf6; stroke-width: 2; rx: 4; }
      .label { font-family: system-ui, sans-serif; font-size: 12px; fill: #26215c; text-anchor: middle; }
      .section-label { font-family: system-ui, sans-serif; font-size: 14px; fill: #333; font-weight: bold; }
      .code { font-family: 'Courier New', monospace; font-size: 11px; fill: #333; }
    </style>
  </defs>
  
  <!-- justify-items section -->
  <g transform="translate(50, 30)">
    <text x="100" y="0" class="section-label" text-anchor="middle">justify-items: center</text>
    
    <rect x="0" y="15" width="60" height="40" class="cell"/>
    <rect x="70" y="15" width="60" height="40" class="cell"/>
    <rect x="140" y="15" width="60" height="40" class="cell"/>
    
    <rect x="20" y="25" width="20" height="20" class="item"/>
    <rect x="90" y="25" width="20" height="20" class="item"/>
    <rect x="160" y="25" width="20" height="20" class="item"/>
    
    <text x="100" y="75" class="label" font-size="11">Items centered in cells (horizontal)</text>
  </g>
  
  <!-- align-items section -->
  <g transform="translate(50, 130)">
    <text x="100" y="0" class="section-label" text-anchor="middle">align-items: center</text>
    
    <rect x="0" y="15" width="60" height="40" class="cell"/>
    <rect x="70" y="15" width="60" height="40" class="cell"/>
    <rect x="140" y="15" width="60" height="40" class="cell"/>
    
    <rect x="20" y="25" width="20" height="20" class="item"/>
    <rect x="90" y="25" width="20" height="20" class="item"/>
    <rect x="160" y="25" width="20" height="20" class="item"/>
    
    <text x="100" y="75" class="label" font-size="11">Items centered in cells (vertical)</text>
  </g>
  
  <!-- Code example -->
  <g transform="translate(350, 30)">
    <rect x="0" y="0" width="200" height="120" fill="#2c3e50" rx="4"/>
    <text x="10" y="20" class="code" fill="#ecf0f1">.grid {</text>
    <text x="10" y="35" class="code" fill="#ecf0f1">  justify-items: center;</text>
    <text x="10" y="50" class="code" fill="#ecf0f1">  align-items: center;</text>
    <text x="10" y="65" class="code" fill="#ecf0f1">}</text>
    <text x="10" y="85" class="code" fill="#ecf0f1">/* Shorthand: */</text>
    <text x="10" y="100" class="code" fill="#ecf0f1">place-items: center;</text>
  </g>
</svg>
