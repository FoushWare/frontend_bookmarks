<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flexbox: equal-width columns</title>
<link rel="stylesheet" href="../../../../theme.css">
<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 40px;
    background: var(--bg-primary);
    color: var(--text-primary);
    transition: background 0.3s, color 0.3s;
  }
  h1 {
    font-size: 16px;
    color: var(--text-primary);
    margin-bottom: 20px;
  }
  .code-block {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
    font-size: 14px;
    border: 1px solid var(--border-color);
  }

  .container {
    display: flex;
    gap: 16px;
  }
  .column {
    flex: 1;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--bg-tertiary);
    border: 2px solid var(--border-color);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    z-index: 1000;
  }
</style>
</head>
<body>
  <button class="theme-toggle" aria-label="Toggle theme">🌙</button>
  <h1>Flexbox: Equal-Width Columns</h1>
  <div class="code-block">
    .container {<br>
    &nbsp;&nbsp;display: flex;<br>
    &nbsp;&nbsp;gap: 16px;<br>
    }<br>
    .column {<br>
    &nbsp;&nbsp;flex: 1;<br>
    }
  </div>
  <div class="container">
    <div class="column">Short content</div>
    <div class="column">A column with quite a bit more text in it, but it still stays exactly the same width as its siblings.</div>
    <div class="column">Medium length content here</div>
  </div>
  <script src="../../../../theme.js"></script>
</body>
</html>
