<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Reference Guide</title>
    <link rel="stylesheet" href="../../../theme.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        .navbar {
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .navbar .logo {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--accent);
            text-decoration: none;
        }
        .navbar .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .theme-toggle {
            background: var(--bg-tertiary);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            border-color: var(--accent);
        }
        .navbar .nav-links a {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .navbar .nav-links a:hover {
            background: var(--bg-tertiary);
            color: var(--accent);
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            background: var(--gradient-primary);
            color: white;
            padding: 60px 20px;
            border-radius: 20px;
            margin-bottom: 40px;
            text-align: center;
        }
        .header h1 {
            font-size: 3em;
            margin-bottom: 15px;
        }
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .content-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .content-nav a {
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            transition: all 0.3s;
        }
        .content-nav a:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .content-nav a.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="../../../index.html" class="logo">🚀 Learning Hub</a>
            <div class="nav-links">
                <a href="../../../css.html">← Back to CSS</a>
                <button class="theme-toggle" aria-label="Toggle theme">🌙</button>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <a href="../../../css.html" class="back-link">← Back to CSS</a>
        
        <div class="header">
            <h1>📐 Layout Reference Guide</h1>
            <p>Comprehensive guide to CSS layout properties</p>
        </div>
        
        <div class="content-nav">
            <a href="layout-reference.html" class="active">📖 Reference Guide</a>
            <a href="layout-examples.html">🎯 Examples</a>
            <a href="layout-interview.html">❓ Interview Questions</a>
            <a href="layout-projects.html">💻 Projects</a>
        </div>
        
        <div class="markdown-content" id="markdownContent">
            Loading...
        </div>
    </div>

    <script src="../../../theme.js"></script>
    <script>
        // Load markdown content
        fetch('layout-reference.md')
            .then(response => response.text())
            .then(markdown => {
                const html = marked.parse(markdown);
                document.getElementById('markdownContent').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('markdownContent').innerHTML = '<p>Error loading content. Please try again.</p>';
            });
    </script>
</body>
</html>
