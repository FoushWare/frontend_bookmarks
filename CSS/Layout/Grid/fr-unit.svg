<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .container { fill: none; stroke: #333; stroke-width: 2; }
      .col-fixed { fill: #faece7; stroke: #f0997b; stroke-width: 2; }
      .col-fr { fill: #eeedfe; stroke: #cecbf6; stroke-width: 2; }
      .label { font-family: system-ui, sans-serif; font-size: 12px; fill: #26215c; text-anchor: middle; }
      .section-label { font-family: system-ui, sans-serif; font-size: 14px; fill: #333; font-weight: bold; }
      .code { font-family: 'Courier New', monospace; font-size: 11px; fill: #333; }
      .arrow { stroke: #667eea; stroke-width: 2; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <!-- Container -->
  <rect x="50" y="50" width="500" height="100" class="container"/>
  
  <!-- Fixed column -->
  <rect x="50" y="50" width="150" height="100" class="col-fixed"/>
  <text x="125" y="105" class="label">200px</text>
  
  <!-- FR columns -->
  <rect x="200" y="50" width="150" height="100" class="col-fr"/>
  <text x="275" y="105" class="label">1fr</text>
  
  <rect x="350" y="50" width="200" height="100" class="col-fr"/>
  <text x="450" y="105" class="label">1fr</text>
  
  <!-- Arrow showing leftover space -->
  <line x1="200" y1="170" x2="550" y2="170" class="arrow"/>
  <text x="375" y="190" class="label" font-size="11">Leftover space split equally</text>
  
  <!-- Code example -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="500" height="40" fill="#2c3e50" rx="4"/>
    <text x="10" y="25" class="code" fill="#ecf0f1">grid-template-columns: 200px 1fr 1fr;</text>
  </g>
</svg>
