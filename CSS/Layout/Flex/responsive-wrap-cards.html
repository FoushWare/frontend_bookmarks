<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flexbox: responsive wrapping cards</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 40px; background: #fafafa; }
  h1 { font-size: 16px; color: #333; margin-bottom: 8px; }
  p { font-size: 13px; color: #666; margin-top: 0; }

  .container {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }
  .card {
    flex: 1 1 200px;
    background: #fbeaf0;
    border: 1px solid #ed93b1;
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    color: #4b1528;
    min-height: 80px;
  }
</style>
</head>
<body>
  <h1>display: flex; flex-wrap: wrap; gap: 16px; — each card: flex: 1 1 200px;</h1>
  <p>Resize the browser window narrower — cards reflow onto new lines once they can't fit at ~200px each.</p>
  <div class="container">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
    <div class="card">Card 4</div>
    <div class="card">Card 5</div>
  </div>
</body>
</html>
