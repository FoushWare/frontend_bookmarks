<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flexbox: navbar layout</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 40px; background: #fafafa; }
  h1 { font-size: 16px; color: #333; }

  .navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ffffff;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px 20px;
  }
  .logo { font-weight: 600; font-size: 15px; color: #26215c; }
  .links { display: flex; gap: 20px; list-style: none; margin: 0; padding: 0; }
  .links a { text-decoration: none; color: #555; font-size: 13px; }
</style>
</head>
<body>
  <h1>display: flex; justify-content: space-between; align-items: center;</h1>
  <nav class="navbar">
    <div class="logo">Brand</div>
    <ul class="links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
</body>
</html>
