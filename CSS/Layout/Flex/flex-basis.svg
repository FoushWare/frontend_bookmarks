<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .container { fill: none; stroke: #333; stroke-width: 2; }
      .item { fill: #eeedfe; stroke: #cecbf6; stroke-width: 2; }
      .item-basis { fill: #faece7; stroke: #f0997b; stroke-width: 2; }
      .label { font-family: system-ui, sans-serif; font-size: 12px; fill: #26215c; text-anchor: middle; }
      .section-label { font-family: system-ui, sans-serif; font-size: 14px; fill: #333; font-weight: bold; }
      .code { font-family: 'Courier New', monospace; font-size: 11px; fill: #333; }
      .arrow { stroke: #667eea; stroke-width: 2; marker-end: url(#arrowhead); }
      .basis-line { stroke: #f0997b; stroke-width: 3; stroke-dasharray: 5,5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>
  
  <!-- Container -->
  <rect x="50" y="50" width="500" height="100" class="container"/>
  
  <!-- Item with flex-basis -->
  <rect x="50" y="50" width="200" height="100" class="item-basis"/>
  <text x="150" y="105" class="label">flex-basis: 200px</text>
  
  <!-- Regular items -->
  <rect x="250" y="50" width="100" height="100" class="item"/>
  <text x="300" y="105" class="label">Item</text>
  
  <rect x="350" y="50" width="100" height="100" class="item"/>
  <text x="400" y="105" class="label">Item</text>
  
  <rect x="450" y="50" width="100" height="100" class="item"/>
  <text x="500" y="105" class="label">Item</text>
  
  <!-- Basis indicator -->
  <line x1="50" y1="160" x2="250" y2="160" class="basis-line"/>
  <line x1="50" y1="155" x2="50" y2="165" stroke="#f0997b" stroke-width="2"/>
  <line x1="250" y1="155" x2="250" y2="165" stroke="#f0997b" stroke-width="2"/>
  <text x="150" y="180" class="label" fill="#f0997b" font-weight="bold">Starting size (basis)</text>
  
  <!-- Arrow showing growth -->
  <line x1="260" y1="170" x2="550" y2="170" class="arrow"/>
  <text x="405" y="190" class="label" font-size="11">Remaining space distributed via flex-grow</text>
  
  <!-- Code example -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="500" height="40" fill="#2c3e50" rx="4"/>
    <text x="10" y="25" class="code" fill="#ecf0f1">.item { flex-basis: 200px; flex-grow: 1; }</text>
  </g>
</svg>
