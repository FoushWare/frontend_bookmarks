<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Projects Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .project-selector {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .project-selector h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        .selector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .project-option {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .project-option:hover {
            border-color: #667eea;
            background: #eeedfe;
        }
        .project-option.active {
            border-color: #667eea;
            background: #eeedfe;
        }
        .project-option h3 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.3em;
        }
        .project-option .type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .type-flex {
            background: #667eea;
            color: white;
        }
        .type-grid {
            background: #764ba2;
            color: white;
        }
        .project-option .difficulty {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        .difficulty-beginner {
            background: #e1f5ee;
            color: #04342c;
        }
        .difficulty-intermediate {
            background: #eeedfe;
            color: #26215c;
        }
        .difficulty-advanced {
            background: #faece7;
            color: #4a1b0c;
        }
        
        /* Goal Section */
        .goal-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .goal-section h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        .goal-section .description {
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 1.1em;
        }
        .goal-preview {
            background: #f8f9fa;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .goal-preview h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        .goal-preview-frame {
            width: 100%;
            height: 200px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            background: white;
        }
        .requirements {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px 20px;
            border-radius: 4px;
        }
        .requirements h3 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        .requirements ul {
            margin-left: 20px;
            color: #555;
        }
        
        /* Hints Section */
        .hints-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .hints-section h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.8em;
        }
        .hint-box {
            background: #fff9c4;
            border-left: 4px solid #fbc02d;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .hint-box h3 {
            color: #f57f17;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        .hint-box p {
            color: #555;
            font-size: 1.1em;
        }
        .hint-controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .hint-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-next-hint {
            background: #fbc02d;
            color: #333;
        }
        .btn-next-hint:hover {
            background: #f9a825;
        }
        .btn-prev-hint {
            background: #e9ecef;
            color: #333;
        }
        .btn-prev-hint:hover {
            background: #dee2e6;
        }
        .hint-counter {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-left: auto;
            align-self: center;
        }
        
        /* Editor Section */
        .editor-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .editor-section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.8em;
        }
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .editor-panel, .preview-panel {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }
        .panel-header h3 {
            color: #2c3e50;
            font-size: 1.3em;
        }
        .editor-tabs {
            display: flex;
            gap: 5px;
        }
        .tab {
            padding: 8px 16px;
            border: none;
            background: #e9ecef;
            color: #333;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .tab:hover:not(.active) {
            background: #dee2e6;
        }
        .code-editor {
            width: 100%;
            height: 400px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border: 1px solid #e9ecef;
            border-radius: 0 8px 8px 8px;
            background: #2c3e50;
            color: #ecf0f1;
            resize: vertical;
            outline: none;
            display: none;
        }
        .code-editor.active {
            display: block;
        }
        .code-editor:focus {
            border-color: #667eea;
        }
        .preview-frame {
            width: 100%;
            height: 400px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            background: white;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-run {
            background: #667eea;
            color: white;
        }
        .btn-run:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        .btn-starter {
            background: #e1f5ee;
            color: #04342c;
        }
        .btn-starter:hover {
            background: #9fe1cb;
        }
        .btn-solution {
            background: #faece7;
            color: #4a1b0c;
        }
        .btn-solution:hover {
            background: #f0997b;
        }
        .btn-reset {
            background: #e9ecef;
            color: #333;
        }
        .btn-reset:hover {
            background: #dee2e6;
        }
        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>💻 CSS Projects Application</h1>
        <p>Practice Flexbox and Grid with interactive projects, hints, and solutions</p>
    </div>
    
    <div class="container">
        <!-- Project Selector -->
        <div class="project-selector">
            <h2>Select a Project</h2>
            <div class="selector-grid" id="projectSelector">
                <!-- Projects will be loaded here -->
            </div>
        </div>
        
        <!-- Goal Section -->
        <div class="goal-section" id="goalSection" style="display: none;">
            <h2>🎯 Project Goal</h2>
            <p class="description" id="goalDescription"></p>
            <div class="goal-preview">
                <h3>📸 Final Result Preview</h3>
                <iframe class="goal-preview-frame" id="goalPreviewFrame"></iframe>
            </div>
            <div class="requirements">
                <h3>Requirements:</h3>
                <ul id="requirementsList"></ul>
            </div>
        </div>
        
        <!-- Hints Section -->
        <div class="hints-section" id="hintsSection" style="display: none;">
            <h2>💡 Hints</h2>
            <div class="hint-box">
                <h3>Hint <span id="hintNumber">1</span></h3>
                <p id="hintText"></p>
            </div>
            <div class="hint-controls">
                <button class="hint-btn btn-prev-hint" onclick="prevHint()">← Previous Hint</button>
                <button class="hint-btn btn-next-hint" onclick="nextHint()">Next Hint →</button>
                <span class="hint-counter" id="hintCounter">1 / 3</span>
            </div>
        </div>
        
        <!-- Editor Section -->
        <div class="editor-section" id="editorSection" style="display: none;">
            <h2>📝 Code Editor</h2>
            <div class="editor-container">
                <div class="editor-panel">
                    <div class="panel-header">
                        <h3>Code Editor</h3>
                        <div class="editor-tabs">
                            <button class="tab active" onclick="switchTab('html')">HTML</button>
                            <button class="tab" onclick="switchTab('css')">CSS</button>
                        </div>
                    </div>
                    <textarea class="code-editor active" id="htmlEditor" spellcheck="false"></textarea>
                    <textarea class="code-editor" id="cssEditor" spellcheck="false"></textarea>
                </div>
                
                <div class="preview-panel">
                    <div class="panel-header">
                        <h3>Live Preview</h3>
                    </div>
                    <iframe class="preview-frame" id="previewFrame"></iframe>
                </div>
            </div>
            <div class="action-buttons">
                <button class="action-btn btn-starter" onclick="loadStarter()">📝 Load Starter Code</button>
                <button class="action-btn btn-solution" onclick="loadSolution()">💡 Load Solution</button>
                <button class="action-btn btn-reset" onclick="resetCode()">↺ Reset</button>
                <button class="action-btn btn-run" onclick="runCode()">▶ Run Code</button>
            </div>
        </div>
    </div>

    <script>
        const projects = [
            {
                id: 'flex-1',
                title: 'Center Content',
                type: 'flex',
                difficulty: 'beginner',
                description: 'Perfectly center content both horizontally and vertically using Flexbox.',
                requirements: [
                    'Center a box both horizontally and vertically',
                    'Use justify-content for horizontal centering',
                    'Use align-items for vertical centering',
                    'Make the container fill the viewport height',
                    'Style the centered box with background color'
                ],
                hints: [
                    'Use display: flex on the container to enable flexbox',
                    'Use justify-content: center to center items horizontally',
                    'Use align-items: center to center items vertically',
                    'Set min-height: 100vh on the container to fill the viewport'
                ],
                starterHTML: `<div class="container">
  <div class="box">Centered Box</div>
</div>`,
                starterCSS: `.container { min-height: 100vh; }
.box { width: 200px; height: 120px; background: #eeedfe; }`,
                solutionHTML: `<div class="container">
  <div class="box">Perfectly Centered</div>
</div>`,
                solutionCSS: `.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.box {
  width: 200px;
  height: 120px;
  background: #eeedfe;
  border: 1px solid #cecbf6;
  border-radius: 8px;
  padding: 20px;
  color: #26215c;
  font-weight: 600;
}`
            },
            {
                id: 'flex-2',
                title: 'Equal Columns',
                type: 'flex',
                difficulty: 'beginner',
                description: 'Create equal-width columns that share available space using the flex property.',
                requirements: [
                    'Create 3 columns that are equal width',
                    'Use flex: 1 to make them share space equally',
                    'Columns should have different content lengths',
                    'Add 20px gap between columns',
                    'Style columns with background colors'
                ],
                hints: [
                    'Use display: flex on the container',
                    'Use flex: 1 on each column to make them equal width',
                    'Use gap: 20px to add space between columns',
                    'The flex: 1 shorthand makes items grow and shrink equally'
                ],
                starterHTML: `<div class="columns">
  <div class="column">
    <h3>Column 1</h3>
    <p>Short content</p>
  </div>
  <div class="column">
    <h3>Column 2</h3>
    <p>This column has much more content than the others.</p>
  </div>
  <div class="column">
    <h3>Column 3</h3>
    <p>Medium content here</p>
  </div>
</div>`,
                starterCSS: `.container { gap: 20px; }
.column { padding: 20px; background: #eeedfe; border-radius: 8px; }
.column h3 { margin-bottom: 10px; }`,
                solutionHTML: `<div class="columns">
  <div class="column">
    <h3>Column 1</h3>
    <p>Short content</p>
  </div>
  <div class="column">
    <h3>Column 2</h3>
    <p>This column has much more content than the others.</p>
  </div>
  <div class="column">
    <h3>Column 3</h3>
    <p>Medium content here</p>
  </div>
</div>`,
                solutionCSS: `.columns {
  display: flex;
  gap: 20px;
}
.column {
  flex: 1;
  padding: 20px;
  background: #eeedfe;
  border: 1px solid #cecbf6;
  border-radius: 8px;
  color: #26215c;
}
.column h3 {
  margin-bottom: 10px;
  color: #2c3e50;
}`
            },
            {
                id: 'grid-1',
                title: 'Responsive Cards',
                type: 'grid',
                difficulty: 'beginner',
                description: 'Create a responsive card grid that adapts to different screen sizes using CSS Grid.',
                requirements: [
                    'Create a grid of cards',
                    'Use auto-fit and minmax for responsive behavior',
                    'Cards should wrap based on viewport width',
                    'Add 20px gap between cards',
                    'Style cards with background colors'
                ],
                hints: [
                    'Use display: grid on the container',
                    'Use grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)) for responsive columns',
                    'Use gap: 20px to add space between cards',
                    'auto-fit creates as many columns as fit, minmax sets minimum width'
                ],
                starterHTML: `<div class="cards">
  <div class="card">Card 1</div>
  <div class="card">Card 2</div>
  <div class="card">Card 3</div>
  <div class="card">Card 4</div>
</div>`,
                starterCSS: `.cards { }
.card { padding: 20px; background: #eeedfe; border-radius: 8px; }`,
                solutionHTML: `<div class="cards">
  <div class="card">Card 1</div>
  <div class="card">Card 2</div>
  <div class="card">Card 3</div>
  <div class="card">Card 4</div>
</div>`,
                solutionCSS: `.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}
.card {
  padding: 20px;
  background: #eeedfe;
  border: 1px solid #cecbf6;
  border-radius: 8px;
  color: #26215c;
  font-weight: 600;
}`
            },
            {
                id: 'grid-2',
                title: 'Page Layout',
                type: 'grid',
                difficulty: 'intermediate',
                description: 'Build a complete page layout with header, sidebar, main content, and footer using Grid.',
                requirements: [
                    'Create a 2-column layout with header and footer spanning full width',
                    'Use grid-template-areas for semantic layout',
                    'Sidebar should be 250px wide',
                    'Main content should fill remaining space',
                    'Header and footer should be auto height'
                ],
                hints: [
                    'Use display: grid on the container',
                    'Use grid-template-areas to define the layout structure',
                    'Use grid-template-columns: 250px 1fr for sidebar and main',
                    'Use grid-template-rows: auto 1fr auto for header, content, footer'
                ],
                starterHTML: `<div class="page">
  <header class="header">Header</header>
  <aside class="sidebar">Sidebar</aside>
  <main class="main">Main Content</main>
  <footer class="footer">Footer</footer>
</div>`,
                starterCSS: `.page { min-height: 100vh; }
.header { padding: 20px; background: #eeedfe; }
.sidebar { padding: 20px; background: #faece7; }
.main { padding: 20px; background: #e1f5ee; }
.footer { padding: 20px; background: #eeedfe; }`,
                solutionHTML: `<div class="page">
  <header class="header">Header</header>
  <aside class="sidebar">Sidebar</aside>
  <main class="main">Main Content</main>
  <footer class="footer">Footer</footer>
</div>`,
                solutionCSS: `.page {
  display: grid;
  grid-template-areas:
    "header header"
    "sidebar main"
    "footer footer";
  grid-template-columns: 250px 1fr;
  grid-template-rows: auto 1fr auto;
  min-height: 100vh;
  gap: 20px;
}
.header {
  grid-area: header;
  padding: 20px;
  background: #eeedfe;
  border: 1px solid #cecbf6;
  color: #26215c;
}
.sidebar {
  grid-area: sidebar;
  padding: 20px;
  background: #faece7;
  border: 1px solid #f0997b;
  color: #4a1b0c;
}
.main {
  grid-area: main;
  padding: 20px;
  background: #e1f5ee;
  border: 1px solid #9fe1cb;
  color: #04342c;
}
.footer {
  grid-area: footer;
  padding: 20px;
  background: #eeedfe;
  border: 1px solid #cecbf6;
  color: #26215c;
}`
            }
        ];

        let currentProject = null;
        let currentHintIndex = 0;
        let currentTab = 'html';

        // Load projects into selector
        function loadProjects() {
            const selector = document.getElementById('projectSelector');
            selector.innerHTML = projects.map(project => `
                <div class="project-option" onclick="selectProject('${project.id}')" id="project-${project.id}">
                    <span class="type type-${project.type}">${project.type === 'flex' ? 'Flexbox' : 'Grid'}</span>
                    <span class="difficulty difficulty-${project.difficulty}">${project.difficulty}</span>
                    <h3>${project.title}</h3>
                </div>
            `).join('');
        }

        // Select a project
        function selectProject(projectId) {
            currentProject = projects.find(p => p.id === projectId);
            currentHintIndex = 0;
            
            // Update active state
            document.querySelectorAll('.project-option').forEach(el => el.classList.remove('active'));
            document.getElementById(`project-${projectId}`).classList.add('active');
            
            // Show sections
            document.getElementById('goalSection').style.display = 'block';
            document.getElementById('hintsSection').style.display = 'block';
            document.getElementById('editorSection').style.display = 'block';
            
            // Load goal
            document.getElementById('goalDescription').textContent = currentProject.description;
            document.getElementById('requirementsList').innerHTML = currentProject.requirements.map(req => `<li>${req}</li>`).join('');
            
            // Load goal preview
            const goalFullHtml = `<!DOCTYPE html><html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: system-ui, sans-serif; padding: 20px; background: #fafafa; } ${currentProject.solutionCSS}</style></head><body>${currentProject.solutionHTML}</body></html>`;
            document.getElementById('goalPreviewFrame').srcdoc = goalFullHtml;
            
            // Load hints
            updateHint();
            
            // Load starter code
            loadStarter();
            
            // Scroll to goal section
            document.getElementById('goalSection').scrollIntoView({ behavior: 'smooth' });
        }

        // Update hint display
        function updateHint() {
            if (!currentProject) return;
            document.getElementById('hintNumber').textContent = currentHintIndex + 1;
            document.getElementById('hintText').textContent = currentProject.hints[currentHintIndex];
            document.getElementById('hintCounter').textContent = `${currentHintIndex + 1} / ${currentProject.hints.length}`;
            
            // Disable/enable buttons
            document.querySelector('.btn-prev-hint').disabled = currentHintIndex === 0;
            document.querySelector('.btn-next-hint').disabled = currentHintIndex === currentProject.hints.length - 1;
        }

        function nextHint() {
            if (currentProject && currentHintIndex < currentProject.hints.length - 1) {
                currentHintIndex++;
                updateHint();
            }
        }

        function prevHint() {
            if (currentProject && currentHintIndex > 0) {
                currentHintIndex--;
                updateHint();
            }
        }

        // Tab switching
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.code-editor').forEach(editor => editor.classList.remove('active'));
            if (tab === 'html') document.getElementById('htmlEditor').classList.add('active');
            else document.getElementById('cssEditor').classList.add('active');
        }

        // Code actions
        function loadStarter() {
            if (!currentProject) return;
            document.getElementById('htmlEditor').value = currentProject.starterHTML;
            document.getElementById('cssEditor').value = currentProject.starterCSS;
            runCode();
        }

        function loadSolution() {
            if (!currentProject) return;
            document.getElementById('htmlEditor').value = currentProject.solutionHTML;
            document.getElementById('cssEditor').value = currentProject.solutionCSS;
            runCode();
        }

        function resetCode() {
            document.getElementById('htmlEditor').value = '';
            document.getElementById('cssEditor').value = '';
            runCode();
        }

        function runCode() {
            const html = document.getElementById('htmlEditor').value;
            const css = document.getElementById('cssEditor').value;
            const fullHtml = `<!DOCTYPE html><html><head><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: system-ui, sans-serif; padding: 20px; background: #fafafa; } ${css}</style></head><body>${html}</body></html>`;
            document.getElementById('previewFrame').srcdoc = fullHtml;
        }

        // Initialize
        loadProjects();
    </script>
</body>
</html>
