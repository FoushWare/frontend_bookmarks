<svg viewBox="0 0 640 220" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<rect width="640" height="220" fill="#ffffff"/>
<text x="320" y="28" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a1a">flex-grow ratio: 1 / 2 / 1</text>
<rect x="40" y="70" width="560" height="90" fill="none" stroke="#bbb" stroke-width="1.5" rx="6"/>
<rect x="40" y="85" width="135.0" height="60" fill="#F0997B" stroke="#993C1D" stroke-width="1.5" rx="4"/><text x="107.5" y="120.0" text-anchor="middle" font-size="12" fill="#4A1B0C">flex-grow: 1</text>
<rect x="185.0" y="85" width="270.0" height="60" fill="#AFA9EC" stroke="#534AB7" stroke-width="1.5" rx="4"/><text x="320.0" y="120.0" text-anchor="middle" font-size="12" fill="#26215C">flex-grow: 2</text>
<rect x="465.0" y="85" width="135.0" height="60" fill="#F0997B" stroke="#993C1D" stroke-width="1.5" rx="4"/><text x="532.5" y="120.0" text-anchor="middle" font-size="12" fill="#4A1B0C">flex-grow: 1</text>
<text x="320" y="195" text-anchor="middle" font-size="12" fill="#555">leftover space is split 1:2:1 — the middle item ends up exactly twice as wide</text>
