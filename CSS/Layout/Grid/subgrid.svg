<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .outer-cell { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
      .card { fill: #eeedfe; stroke: #cecbf6; stroke-width: 2; rx: 4; }
      .card-inner { fill: #faece7; stroke: #f0997b; stroke-width: 1; }
      .label { font-family: system-ui, sans-serif; font-size: 11px; fill: #26215c; text-anchor: middle; }
      .section-label { font-family: system-ui, sans-serif; font-size: 14px; fill: #333; font-weight: bold; }
      .code { font-family: 'Courier New', monospace; font-size: 10px; fill: #333; }
      .line { stroke: #667eea; stroke-width: 1; stroke-dasharray: 3,3; }
    </style>
  </defs>
  
  <!-- Outer grid -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="100" height="120" class="outer-cell"/>
    <rect x="100" y="0" width="100" height="120" class="outer-cell"/>
    <rect x="200" y="0" width="100" height="120" class="outer-cell"/>
    <rect x="300" y="0" width="100" height="120" class="outer-cell"/>
  </g>
  
  <!-- Card with subgrid -->
  <rect x="150" y="50" width="100" height="120" class="card"/>
  
  <!-- Inner subgrid elements aligned to outer columns -->
  <rect x="150" y="50" width="100" height="30" class="card-inner"/>
  <text x="200" y="70" class="label">Title</text>
  
  <rect x="150" y="80" width="100" height="60" class="card-inner"/>
  <text x="200" y="115" class="label">Content</text>
  
  <rect x="150" y="140" width="100" height="30" class="card-inner"/>
  <text x="200" y="160" class="label">Footer</text>
  
  <!-- Alignment lines showing subgrid inherits outer columns -->
  <line x1="150" y1="50" x2="150" y2="170" class="line"/>
  <line x1="250" y1="50" x2="250" y2="170" class="line"/>
  
  <!-- Labels -->
  <text x="100" y="115" class="label">Col 1</text>
  <text x="200" y="115" class="label">Col 2</text>
  <text x="300" y="115" class="label">Col 3</text>
  <text x="400" y="115" class="label">Col 4</text>
  
  <text x="200" y="195" class="label" font-weight="bold">Card with subgrid</text>
  <text x="200" y="210" class="label" font-size="10">Inner elements align to outer columns</text>
  
  <!-- Code example -->
  <g transform="translate(350, 50)">
    <rect x="0" y="0" width="200" height="120" fill="#2c3e50" rx="4"/>
    <text x="10" y="20" class="code" fill="#ecf0f1">.outer {</text>
    <text x="10" y="35" class="code" fill="#ecf0f1">  display: grid;</text>
    <text x="10" y="50" class="code" fill="#ecf0f1">  grid-template-columns:</text>
    <text x="10" y="65" class="code" fill="#ecf0f1">    repeat(4, 1fr);</text>
    <text x="10" y="80" class="code" fill="#ecf0f1">}</text>
    <text x="10" y="95" class="code" fill="#ecf0f1">.card {</text>
    <text x="10" y="110" class="code" fill="#ecf0f1">  grid-template-columns:</text>
    <text x="10" y="125" class="code" fill="#ecf0f1">    subgrid;</text>
  </g>
</svg>
