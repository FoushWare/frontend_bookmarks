<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flexbox: fixed sidebar + fluid content</title>
<link rel="stylesheet" href="../../../../theme.css">
<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 40px;
    background: var(--bg-primary);
    color: var(--text-primary);
    transition: background 0.3s, color 0.3s;
  }
  h1 {
    font-size: 16px;
    color: var(--text-primary);
    margin-bottom: 20px;
  }
  .code-block {
    background: var(--code-bg);
    color: var(--code-text);
    padding: 16px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
    font-size: 14px;
    border: 1px solid var(--border-color);
  }

  .container {
    display: flex;
    height: 240px;
    gap: 16px;
  }
  .sidebar {
    flex: 0 0 200px;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .content {
    flex: 1;
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .theme-toggle {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--bg-tertiary);
    border: 2px solid var(--border-color);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    z-index: 1000;
  }
</style>
</head>
<body>
  <button class="theme-toggle" aria-label="Toggle theme">🌙</button>
  <h1>Flexbox: Fixed Sidebar + Fluid Content</h1>
  <div class="code-block">
    .sidebar { flex: 0 0 200px; }<br>
    .content { flex: 1; }
  </div>
  <div class="container">
    <div class="sidebar">Fixed 200px sidebar — never grows, never shrinks</div>
    <div class="content">Content fills whatever space is left, and reflows as the window resizes</div>
  </div>
  <script src="../../../../theme.js"></script>
</body>
</html>
