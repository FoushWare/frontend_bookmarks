<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid: Responsive Cards</title>
    <style>
        body { font-family: system-ui, sans-serif; margin: 0; padding: 40px; background: #fafafa; }
        h1 { font-size: 16px; color: #333; margin-bottom: 8px; }
        p { font-size: 13px; color: #666; margin-top: 0; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .card {
            background: #eeedfe;
            border: 1px solid #cecbf6;
            border-radius: 8px;
            padding: 16px;
            font-size: 13px;
            color: #26215c;
            min-height: 100px;
        }
        .card:nth-child(1) { background: #e1f5ee; border-color: #9fe1cb; color: #04342c; }
        .card:nth-child(2) { background: #faece7; border-color: #f0997b; color: #4a1b0c; }
        .card:nth-child(3) { background: #fbeaf0; border-color: #ed93b1; color: #4b1528; }
        .card:nth-child(4) { background: #e8f4fd; border-color: #a8d4f5; color: #0a3d5c; }
    </style>
</head>
<body>
    <h1>grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));</h1>
    <p>Responsive card grid with no media queries - resize browser to see cards reflow</p>
    <div class="grid">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
        <div class="card">Card 4</div>
    </div>
</body>
</html>
